<div class="login-container">

  <button mat-icon-button class="next-btn">
    <mat-icon>arrow_forward</mat-icon>
  </button>

  <div class="logo-section">

    <img src="assets/images/logo.png" class="logo">

    <h1>
      به بافون خوش آمدید
    </h1>

    <p>
      اولین مرجع خرید موبایل دست دوم
    </p>

  </div>

  <div class="form-section">

    <h2>
      ورود یا ثبت نام با شماره تلفن
    </h2>

    <mat-form-field appearance="outline" class="mobile-field">

      <input
        matInput
        placeholder="۰۹۰۰۰۰۰۰۰۰۰"
        maxlength="11">

    </mat-form-field>

    <button
      mat-flat-button
      color="primary"
      class="send-btn">

      ارسال کد

    </button>

    <p class="terms">
      ثبت نام شما به منزله پذیرش قوانین است
    </p>

  </div>

  <div class="seller-link">

    <button mat-button>

      برای حساب فروشگاهی کلیک کنید

      <mat-icon>
        chevron_left
      </mat-icon>

    </button>

  </div>

</div>
